<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="manifest.json">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <title>OmniCam AI</title>
</head>
<body class="bg-black text-white font-sans overflow-x-hidden">

    <header class="p-4 bg-gray-900 border-b border-gray-800 flex justify-between items-center sticky top-0 z-50">
        <div>
            <h1 class="text-red-500 font-black text-xl tracking-tighter">OMNICAM</h1>
            <p id="ia-status" class="text-[10px] text-gray-500 uppercase">Carregando IA...</p>
        </div>
        <button onclick="document.getElementById('modal').classList.toggle('hidden')" class="bg-red-600 px-4 py-2 rounded-xl text-xs font-bold shadow-lg active:scale-95 transition-all">＋ ADD CAM</button>
    </header>

    <main id="grade" class="p-3 grid grid-cols-1 gap-6 mb-24"></main>

    <div id="modal" class="hidden fixed inset-0 bg-black/95 z-50 p-6 flex flex-col justify-center animate-fade-in">
        <h2 class="text-2xl font-bold mb-6 border-b border-gray-800 pb-2">Registrar Câmera</h2>
        <div class="space-y-4">
            <input id="n" type="text" placeholder="Nome da Câmera" class="w-full bg-gray-800 p-4 rounded-xl outline-none focus:ring-2 focus:ring-red-500">
            <input id="ip" type="text" placeholder="IP Local (ex: 192.168.1.50)" class="w-full bg-gray-800 p-4 rounded-xl outline-none focus:ring-2 focus:ring-red-500">
            <div class="grid grid-cols-2 gap-4">
                <input id="u" type="text" placeholder="Usuário" class="bg-gray-800 p-4 rounded-xl outline-none focus:ring-2 focus:ring-red-500">
                <input id="p" type="password" placeholder="Senha" class="bg-gray-800 p-4 rounded-xl outline-none focus:ring-2 focus:ring-red-500">
            </div>
            <button onclick="salvar()" class="w-full bg-red-600 p-5 rounded-2xl font-black text-lg shadow-xl active:bg-red-700">CONECTAR E ATIVAR</button>
            <button onclick="document.getElementById('modal').classList.add('hidden')" class="w-full text-gray-500 font-bold p-2">CANCELAR</button>
        </div>
    </div>

    <script>
        let cams = JSON.parse(localStorage.getItem('omni_cams') || '[]');
        let net;

        // Inicializa a IA
        async function initIA() {
            try {
                net = await cocoSsd.load();
                document.getElementById('ia-status').innerText = "✅ IA Ativa (Modo Local)";
                monitorar();
            } catch (e) {
                document.getElementById('ia-status').innerText = "❌ Erro ao carregar IA";
            }
        }

        function salvar() {
            const cam = {
                id: Date.now(),
                n: document.getElementById('n').value,
                ip: document.getElementById('ip').value,
                u: document.getElementById('u').value,
                p: document.getElementById('p').value
            };
            cams.push(cam);
            localStorage.setItem('omni_cams', JSON.stringify(cams));
            location.reload();
        }

        async function monitorar() {
            for(let cam of cams) {
                const img = document.getElementById(`v-${cam.id}`);
                const status = document.getElementById(`s-${cam.id}`);
                if(!img || !net) continue;
                
                // Analisa o frame atual (Snapshot)
                const predictions = await net.detect(img);
                
                if(predictions.length > 0) {
                    status.innerText = "🏃 MOVIMENTO DETECTADO!";
                    status.classList.replace('text-gray-500', 'text-red-500');
                    capturarNoCelular(img, cam.n);
                    
                    // Comando CGI para seguir movimento (Following)
                    fetch(`http://${cam.ip}/cgi-bin/ptz.cgi?action=startTrack`).catch(e => {});
                } else {
                    status.innerText = "✅ Monitorando...";
                    status.classList.replace('text-red-500', 'text-gray-500');
                }
            }
            setTimeout(monitorar, 1500); // Frequência de análise
        }

        function capturarNoCelular(img, nome) {
            const canvas = document.createElement('canvas');
            canvas.width = img.width; canvas.height = img.height;
            canvas.getContext('2d').drawImage(img, 0, 0);
            const link = document.createElement('a');
            link.download = `ALERTA-${nome}-${new Date().toLocaleTimeString()}.jpg`;
            link.href = canvas.toDataURL('image/jpeg');
            link.click(); // Salva na memória do celular
        }

        function render() {
            const g = document.getElementById('grade');
            if(cams.length === 0) g.innerHTML = '<div class="text-center py-20 text-gray-700">Adicione uma câmera para começar</div>';
            g.innerHTML = cams.map(c => `
                <div class="bg-gray-900 rounded-3xl overflow-hidden border border-gray-800 shadow-2xl">
                    <div class="p-4 flex justify-between items-center">
                        <span class="font-bold tracking-tight">${c.n}</span>
                        <span id="s-${c.id}" class="text-[10px] text-gray-500 font-mono italic">Iniciando...</span>
                    </div>
                    <img id="v-${c.id}" src="http://${c.ip}/cgi-bin/snapshot.cgi?u=${c.u}&p=${c.p}" crossorigin="anonymous" class="w-full aspect-video bg-black object-cover border-y border-gray-800">
                    <div class="p-4 grid grid-cols-4 gap-2">
                        <button onclick="fetch('http://${c.ip}/cgi-bin/ptz.cgi?dir=left')" class="bg-gray-800 p-3 rounded-xl active:bg-red-600">◀</button>
                        <button onclick="fetch('http://${c.ip}/cgi-bin/ptz.cgi?dir=up')" class="bg-gray-800 p-3 rounded-xl active:bg-red-600">▲</button>
                        <button onclick="fetch('http://${c.ip}/cgi-bin/ptz.cgi?dir=down')" class="bg-gray-800 p-3 rounded-xl active:bg-red-600">▼</button>
                        <button onclick="fetch('http://${c.ip}/cgi-bin/ptz.cgi?dir=right')" class="bg-gray-800 p-3 rounded-xl active:bg-red-600">▶</button>
                    </div>
                </div>
            `).join('');
        }

        render();
        initIA();
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    </script>
</body>
</html>
